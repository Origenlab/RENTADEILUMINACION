<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://rentadeiluminacion.com/">
  <title>Página no encontrada | REDEIL</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1.5rem; text-align: center; color: #333; }
    h1 { font-size: 2rem; color: #1a1a1a; }
    p { color: #666; line-height: 1.6; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 2rem 0; }
    a.btn { padding: 0.75rem 1.5rem; background: #ff5722; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
    a.btn-outline { padding: 0.75rem 1.5rem; border: 2px solid #ff5722; color: #ff5722; text-decoration: none; border-radius: 8px; font-weight: 600; }
    .counter { font-size: 0.9rem; color: #999; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Página no encontrada</h1>
  <p>La página que buscas ya no existe o fue movida. Nuestro sitio ha sido actualizado con nuevos servicios de iluminación y sonido.</p>
  <div class="links">
    <a href="/" class="btn">Ir al inicio</a>
    <a href="/servicios/" class="btn-outline">Ver servicios</a>
    <a href="/contacto/" class="btn-outline">Contacto</a>
  </div>
  <p class="counter">Serás redirigido al inicio en <span id="s">5</span> segundos...</p>
  <script>
    (function() {
      var path = window.location.pathname.toLowerCase();
      var dest = '/';
      if (path.indexOf('/producto/') !== -1) {
        if (path.indexOf('iluminaci') !== -1 || path.indexOf('luces') !== -1 || path.indexOf('led') !== -1) dest = '/servicios/luces-led/';
        else if (path.indexOf('bocina') !== -1 || path.indexOf('sonido') !== -1 || path.indexOf('parlante') !== -1) dest = '/servicios/bocinas/';
        else if (path.indexOf('humo') !== -1) dest = '/servicios/maquina-humo/';
        else if (path.indexOf('dj') !== -1) dest = '/servicios/dj/';
        else if (path.indexOf('confeti') !== -1) dest = '/servicios/confeti/';
        else if (path.indexOf('bola') !== -1 || path.indexOf('disco') !== -1) dest = '/servicios/bola-disco/';
        else if (path.indexOf('guirnalda') !== -1) dest = '/servicios/guirnaldas/';
        else if (path.indexOf('neon') !== -1 || path.indexOf('ne\u00f3n') !== -1) dest = '/servicios/luces-neon/';
        else dest = '/servicios/';
      } else if (path.indexOf('/categoria-producto/') !== -1 || path.indexOf('/etiqueta-producto/') !== -1 || path.indexOf('/product-category/') !== -1) {
        dest = '/servicios/';
      } else if (path.indexOf('/blog/') !== -1 || path.indexOf('/articulo/') !== -1) {
        dest = '/blog/';
      }
      var n = 5;
      var el = document.getElementById('s');
      var t = setInterval(function() {
        n--;
        if (el) el.textContent = n;
        if (n <= 0) { clearInterval(t); window.location.replace(dest); }
      }, 1000);
    })();
  </script>
</body>
</html>
